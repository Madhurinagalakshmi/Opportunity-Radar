<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opportunity Radar - AI Stock Signal Detection</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }
        
        h1 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            font-size: 16px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .stat-label {
            color: #999;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        
        .stat-value {
            font-size: 36px;
            font-weight: bold;
            color: #333;
        }
        
        .stat-subtext {
            color: #666;
            font-size: 13px;
            margin-top: 8px;
        }
        
        .signals-section {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 30px;
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        
        .section-title {
            font-size: 24px;
            color: #333;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .signal-card {
            border: 2px solid #f0f0f0;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s;
        }
        
        .signal-card:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.2);
        }
        
        .signal-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        
        .signal-company {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }
        
        .signal-symbol {
            color: #667eea;
            font-size: 14px;
            margin-top: 3px;
        }
        
        .signal-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }
        
        .badge-buy {
            background: #10b981;
            color: white;
        }
        
        .badge-sell {
            background: #ef4444;
            color: white;
        }
        
        .badge-watch {
            background: #f59e0b;
            color: white;
        }
        
        .confidence-bar {
            height: 6px;
            background: #e5e7eb;
            border-radius: 3px;
            margin: 10px 0;
            overflow: hidden;
        }
        
        .confidence-fill {
            height: 100%;
            background: linear-gradient(90deg, #10b981, #667eea);
            border-radius: 3px;
            transition: width 0.5s;
        }
        
        .signal-reasoning {
            color: #666;
            line-height: 1.6;
            margin-top: 10px;
        }
        
        .signal-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #f0f0f0;
            font-size: 13px;
            color: #999;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        
        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        .filter-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .filter-tab {
            padding: 8px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .filter-tab.active {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }
        
        .price-tag {
            font-weight: bold;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎯 Opportunity Radar</h1>
            <p class="subtitle">AI-Powered Stock Market Signal Detection System</p>
        </header>
        
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-label">Active Signals</div>
                <div class="stat-value" id="totalSignals">--</div>
                <div class="stat-subtext">Investment opportunities detected</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-label">Win Rate</div>
                <div class="stat-value" id="winRate">--</div>
                <div class="stat-subtext">Historical accuracy</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-label">Avg Return</div>
                <div class="stat-value" id="avgReturn">--</div>
                <div class="stat-subtext">Per successful signal</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-label">Portfolio Value</div>
                <div class="stat-value" id="portfolioValue">--</div>
                <div class="stat-subtext">On ₹1L investment (simulated)</div>
            </div>
        </div>
        
        <div class="signals-section">
            <div class="section-header">
                <h2 class="section-title">Live Signals</h2>
                <button class="btn btn-primary" onclick="refreshData()">🔄 Refresh Data</button>
            </div>
            
            <div class="filter-tabs">
                <button class="filter-tab active" onclick="filterSignals('ALL')">All Signals</button>
                <button class="filter-tab" onclick="filterSignals('BUY')">BUY Only</button>
                <button class="filter-tab" onclick="filterSignals('SELL')">SELL Only</button>
                <button class="filter-tab" onclick="filterSignals('WATCH')">WATCH Only</button>
            </div>
            
            <div id="signalsContainer">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading signals...</p>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:8000/api';
        let currentFilter = 'ALL';
        
        // Load dashboard data
        async function loadDashboard() {
            try {
                const response = await fetch(`${API_URL}/stats/dashboard`);
                const data = await response.json();
                
                // Update stats
                document.getElementById('totalSignals').textContent = data.signal_summary.total_active_signals;
                
                if (data.backtest_performance.win_rate !== undefined) {
                    document.getElementById('winRate').textContent = `${data.backtest_performance.win_rate}%`;
                    document.getElementById('avgReturn').textContent = `${data.backtest_performance.avg_return_pct}%`;
                    
                    const portfolioValue = data.backtest_performance.portfolio_simulation?.final_value || 100000;
                    document.getElementById('portfolioValue').textContent = `₹${(portfolioValue/1000).toFixed(1)}K`;
                } else {
                    document.getElementById('winRate').textContent = 'N/A';
                    document.getElementById('avgReturn').textContent = 'N/A';
                    document.getElementById('portfolioValue').textContent = '₹100K';
                }
                
                // Load signals
                await loadSignals();
                
            } catch (error) {
                console.error('Error loading dashboard:', error);
                document.getElementById('signalsContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <h3>Unable to connect to API</h3>
                        <p>Make sure the backend server is running on port 8000</p>
                    </div>
                `;
            }
        }
        
        // Load signals
        async function loadSignals() {
            try {
                const url = currentFilter === 'ALL' 
                    ? `${API_URL}/signals`
                    : `${API_URL}/signals?signal_type=${currentFilter}`;
                
                const response = await fetch(url);
                const signals = await response.json();
                
                const container = document.getElementById('signalsContainer');
                
                if (signals.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📊</div>
                            <h3>No signals yet</h3>
                            <p>Click "Refresh Data" to collect and analyze latest filings</p>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = signals.map(signal => `
                    <div class="signal-card">
                        <div class="signal-header">
                            <div>
                                <div class="signal-company">${signal.company_name}</div>
                                <div class="signal-symbol">${signal.stock_symbol}${signal.price_at_signal ? ` • <span class="price-tag">₹${signal.price_at_signal}</span>` : ''}</div>
                            </div>
                            <span class="signal-badge badge-${signal.signal_type.toLowerCase()}">
                                ${signal.signal_type}
                            </span>
                        </div>
                        
                        <div class="confidence-bar">
                            <div class="confidence-fill" style="width: ${signal.confidence_score}%"></div>
                        </div>
                        
                        <div style="font-size: 13px; color: #999; margin-top: 5px;">
                            Confidence: ${signal.confidence_score}%
                        </div>
                        
                        <div class="signal-reasoning">
                            ${signal.reasoning}
                        </div>
                        
                        <div class="signal-footer">
                            <span>Generated ${formatDate(signal.generated_at)}</span>
                            <span>Signal ID: #${signal.id}</span>
                        </div>
                    </div>
                `).join('');
                
            } catch (error) {
                console.error('Error loading signals:', error);
            }
        }
        
        // Filter signals
        function filterSignals(type) {
            currentFilter = type;
            
            // Update active tab
            document.querySelectorAll('.filter-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            event.target.classList.add('active');
            
            loadSignals();
        }
        
        // Refresh data (collect + analyze)
        async function refreshData() {
            const btn = event.target;
            btn.textContent = '⏳ Processing...';
            btn.disabled = true;
            
            try {
                // Run full pipeline
                await fetch(`${API_URL}/run-full-pipeline`, { method: 'POST' });
                
                // Wait a bit for processing
                setTimeout(async () => {
                    await loadDashboard();
                    btn.textContent = '🔄 Refresh Data';
                    btn.disabled = false;
                }, 5000);
                
            } catch (error) {
                console.error('Error refreshing data:', error);
                btn.textContent = '❌ Error';
                setTimeout(() => {
                    btn.textContent = '🔄 Refresh Data';
                    btn.disabled = false;
                }, 2000);
            }
        }
        
        // Format date helper
        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHours = Math.floor(diffMs / 3600000);
            const diffDays = Math.floor(diffMs / 86400000);
            
            if (diffMins < 1) return 'just now';
            if (diffMins < 60) return `${diffMins}m ago`;
            if (diffHours < 24) return `${diffHours}h ago`;
            if (diffDays < 7) return `${diffDays}d ago`;
            
            return date.toLocaleDateString();
        }
        
        // Load dashboard on page load
        loadDashboard();
        
        // Auto-refresh every 5 minutes
        setInterval(loadSignals, 300000);
    </script>
</body>
</html>
